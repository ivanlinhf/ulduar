name: Backend Deploy

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - apps/backend/**
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
      BACKEND_CONTAINER_APP_NAME: ${{ vars.BACKEND_CONTAINER_APP_NAME }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.event.pull_request.merge_commit_sha }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Resolve backend image name
        run: |
          registry_server="$(az acr show --name "$AZURE_ACR_NAME" --query loginServer -o tsv)"
          image_tag="$(git rev-parse HEAD)"
          echo "BACKEND_IMAGE=${registry_server}/ulduar-backend:${image_tag}" >> "$GITHUB_ENV"

      - name: Log in to Azure Container Registry
        run: az acr login --name "$AZURE_ACR_NAME"

      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile -t "$BACKEND_IMAGE" apps/backend

      - name: Push backend image
        run: docker push "$BACKEND_IMAGE"

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: docker run --rm --entrypoint migrate --env DATABASE_URL "$BACKEND_IMAGE" up

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name "$BACKEND_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$BACKEND_IMAGE" \
            --set-env-vars RUN_DB_MIGRATIONS=false
