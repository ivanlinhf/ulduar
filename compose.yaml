services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-compose-local}
    depends_on:
      - backend
    environment:
      PORT: "${FRONTEND_PORT:-3000}"
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-development}
      BACKEND_PORT: "${BACKEND_PORT:-8080}"
      BACKEND_READ_HEADER_TIMEOUT: ${BACKEND_READ_HEADER_TIMEOUT:-5s}
      BACKEND_READ_TIMEOUT: ${BACKEND_READ_TIMEOUT:-90s}
      BACKEND_IDLE_TIMEOUT: ${BACKEND_IDLE_TIMEOUT:-120s}
      BACKEND_SHUTDOWN_TIMEOUT: ${BACKEND_SHUTDOWN_TIMEOUT:-10s}
      BACKEND_REQUEST_TIMEOUT: ${BACKEND_REQUEST_TIMEOUT:-15s}
      BACKEND_MESSAGE_REQUEST_TIMEOUT: ${BACKEND_MESSAGE_REQUEST_TIMEOUT:-90s}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/ulduar?sslmode=disable}
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-devstoreaccount1}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY:-Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==}
      AZURE_STORAGE_BLOB_ENDPOINT: ${AZURE_STORAGE_BLOB_ENDPOINT:-http://azurite:10000/devstoreaccount1}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-chat-attachments}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-https://example.openai.azure.com}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-replace-me}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-v1}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-5-chat}
      AZURE_OPENAI_SYSTEM_PROMPT: ${AZURE_OPENAI_SYSTEM_PROMPT:-}
      AZURE_OPENAI_ENABLE_WEB_SEARCH: ${AZURE_OPENAI_ENABLE_WEB_SEARCH:-false}
      AZURE_OPENAI_REQUEST_TIMEOUT: ${AZURE_OPENAI_REQUEST_TIMEOUT:-90s}
      AZURE_OPENAI_STREAM_TIMEOUT: ${AZURE_OPENAI_STREAM_TIMEOUT:-10m}
      CHAT_RUN_FINALIZATION_TIMEOUT: ${CHAT_RUN_FINALIZATION_TIMEOUT:-15s}
      IMAGE_GENERATION_MAX_REFERENCE_IMAGE_BYTES: ${IMAGE_GENERATION_MAX_REFERENCE_IMAGE_BYTES:-20971520}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"

  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ulduar}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ulduar}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command:
      - azurite-blob
      - --blobHost
      - 0.0.0.0
      - --location
      - /data
      - --skipApiVersionCheck
    ports:
      - "${AZURITE_BLOB_PORT:-10000}:10000"
